{% extends "shared/base.html" %}
{% block title %}{{ mode }} FAQ — LazyFitness{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-8"><div class="card p-4"><h2 class="section-title">{{ mode }} FAQ</h2><form method="post" novalidate>{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}</div>{% endfor %}<button class="btn btn-primary">Save FAQ</button><a class="btn btn-outline-light" href="{% url 'admin_panel:faq_list' %}">Cancel</a></form></div></div></div>{% endblock %}
