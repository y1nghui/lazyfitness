{% extends "shared/base.html" %}{% block title %}Delete Workout Plan — LazyFitness{% endblock %}{% block content %}<div class="row justify-content-center"><div class="col-lg-6"><div class="card p-4"><h2 class="section-title">Delete Workout Plan</h2><p>Are you sure you want to delete <strong>{{ plan }}</strong>?</p><form method="post">{% csrf_token %}<button class="btn btn-danger">Delete</button><a class="btn btn-outline-light" href="{% if plan.plan %}{% url 'coach:plan_detail' plan.plan.id %}{% else %}{% url 'coach:plan_list' %}{% endif %}">Cancel</a></form></div></div></div>{% endblock %}
