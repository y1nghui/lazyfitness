{% extends "shared/base.html" %}
{% block title %}FAQ — LazyFitness{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="section-title mb-0">Frequently Asked Questions</h2>
        <p class="text-secondary mb-0">Browse answers created by LazyFitness administrators.</p>
    </div>
</div>

<div class="accordion" id="faqAccordion">
    {% for faq in faqs %}
    <div class="accordion-item bg-dark text-light border-secondary mb-3">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed bg-dark text-light" type="button" data-lf-toggle="collapse" data-lf-target="#faq{{ faq.id }}">
                {{ faq.question }}
            </button>
        </h2>
        <div id="faq{{ faq.id }}" class="accordion-collapse collapse" data-lf-parent="#faqAccordion">
            <div class="accordion-body">
                <p>{{ faq.answer|linebreaksbr }}</p>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="card p-4 text-center text-secondary">No FAQ entries yet.</div>
    {% endfor %}
</div>
{% endblock %}
