{% extends "shared/base.html" %}
{% block title %}FAQ — LazyFitness{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="section-title mb-0">Frequently Asked Questions</h2>
            <p class="text-secondary mb-0">Browse answers created by LazyFitness administrators.</p>
        </div>
    </div>

    <div class="accordion" id="faqAccordion">
        {% for faq in faqs %}
        <div class="accordion-item lf-faq-item mb-3">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-lf-toggle="collapse" data-lf-target="#faq{{ faq.id }}">
                    {{ faq.question }}
                </button>
            </h2>
            <div id="faq{{ faq.id }}" class="accordion-collapse collapse" data-lf-parent="#faqAccordion">
                <div class="accordion-body">
                    <p class="mb-0">{{ faq.answer|linebreaksbr }}</p>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="card p-4 text-center text-secondary bg-transparent border-secondary">No FAQ entries yet.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
