
{% extends "shared/base.html" %}
{% block title %}Schedule — LazyFitness{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3 btn-toolbar-mobile">
  <div>
    <h2 class="section-title mb-1">Plan Calendar</h2>
    <p class="text-secondary mb-0">View your assigned Diet Plans and Workout Plans in one calendar.</p>
  </div>
</div>

<div id="calendar-container">
  <div id="calendar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dayjs"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js"></script>

<style>
    #calendar-container {
        width: 70%;
        margin: 40px auto;
        padding: 20px;
        box-shadow: 0 0 15px rgba(255, 61, 36, 0.15);
        background-color: #1f1f1f;
        border-radius: 12px;
        border: 1px solid rgba(255, 61, 36, 0.25);
    }

    #calendar {
        width: 100%;
        max-width: 100%;
        color: #f5f5f5;
    }

    /* Calendar toolbar title */
    #calendar .fc-toolbar-title {
        color: #ffffff;
        font-weight: 700;
    }

    /* Calendar buttons */
    #calendar .fc-button {
        background-color: #2b2b2b;
        border-color: #444;
        color: #ffffff;
        box-shadow: none;
    }

    #calendar .fc-button:hover {
        background-color: #ff3d24;
        border-color: #ff3d24;
        color: #ffffff;
    }

    #calendar .fc-button-primary:not(:disabled).fc-button-active,
    #calendar .fc-button-primary:not(:disabled):active {
        background-color: #ff3d24;
        border-color: #ff3d24;
    }

    /* Calendar table */
    #calendar .fc-scrollgrid,
    #calendar .fc-theme-standard td,
    #calendar .fc-theme-standard th {
        border-color: #3a3a3a;
    }

    /* Day header row */
    #calendar .fc-col-header-cell {
        background-color: #2a2a2a;
    }

    #calendar .fc-col-header-cell-cushion {
        color: #ffffff;
        text-decoration: none;
    }

    /* Day cells */
    #calendar .fc-daygrid-day {
        background-color: #181818;
    }

    #calendar .fc-daygrid-day-number {
        color: #dddddd;
        text-decoration: none;
    }

    /* Today cell */
    #calendar .fc-day-today {
        background-color: rgba(255, 61, 36, 0.18) !important;
    }

    /* Other month dates */
    #calendar .fc-day-other {
        background-color: #111111;
    }

    #calendar .fc-day-other .fc-daygrid-day-number {
        color: #777777;
    }

    /* Events */
    #calendar .fc-event {
        border: none;
        border-radius: 5px;
        padding: 2px 4px;
        font-size: 13px;
        cursor: pointer;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');
  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    events: '{% url "gym_user:calendar_events" %}',
    eventDisplay: 'auto',
    height: 'auto',
    contentHeight: 'auto',
    eventClick: function(info) {
      const details = info.event.extendedProps.details;
      if (details) {
        alert(details.trim());
      }
    }
  });

  calendar.render();
});
</script>
{% endblock %}
